<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1a5276;
  --accent:#2980b9;
  --bg:#f5f7fa;
  --card:#fff;
  --text:#2c3e50;
  --light:#ecf0f1;
  --tag-bg:#e8f4fd;
  --tag-active:#2980b9;
  --tag-active-text:#fff;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  /* 模块颜色 */
  --brain:#6c5ce7;
  --head:#00b894;
  --lung:#e17055;
  --abdomen:#fdcb6e;
  --bone:#74b9ff;
  --cardio:#e84393;
  --breast:#00cec9;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding-top:var(--safe-top);padding-bottom:calc(var(--safe-bottom) + 60px)}

/* 头部 */
.header{background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;padding:16px 20px;padding-top:calc(16px + var(--safe-top));position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:18px;font-weight:600}
.header p{font-size:12px;opacity:.8;margin-top:2px}

/* 模块导航 */
.module-nav{padding:12px 16px;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;background:#fff;position:sticky;top:0;z-index:99}
.module-nav::-webkit-scrollbar{display:none}
.module-btn{flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#666;transition:all .2s;white-space:nowrap}
.module-btn.active{color:#fff;border-color:transparent}
.module-btn[data-module="brain"].active{background:var(--brain)}
.module-btn[data-module="head"].active{background:var(--head)}
.module-btn[data-module="lung"].active{background:var(--lung)}
.module-btn[data-module="abdomen"].active{background:var(--abdomen);color:#333}
.module-btn[data-module="bone"].active{background:var(--bone)}
.module-btn[data-module="cardio"].active{background:var(--cardio)}
.module-btn[data-module="breast"].active{background:var(--breast)}
.module-btn[data-module="all"].active{background:var(--primary)}

/* 分类标签 */
.tags{padding:8px 16px 12px;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;background:var(--bg);position:sticky;top:0;z-index:98}
.tags::-webkit-scrollbar{display:none}
.tag{flex-shrink:0;padding:5px 14px;border-radius:16px;font-size:12px;background:var(--tag-bg);color:var(--accent);cursor:pointer;border:none;transition:all .2s;white-space:nowrap}
.tag.active{background:var(--tag-active);color:var(--tag-active-text)}

.search-box{padding:12px 16px;background:var(--bg);position:sticky;top:0;z-index:97}
.search-box input{width:100%;padding:10px 16px;border:1px solid #ddd;border-radius:20px;font-size:14px;background:var(--card);outline:none;transition:border .2s}
.search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(41,128,185,.15)}

.stats{padding:8px 16px;font-size:12px;color:#888;background:var(--bg)}
.disease-list{padding:0 16px 100px}
.disease-card{background:var(--card);border-radius:12px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden;transition:transform .2s}
.disease-card:active{transform:scale(.98)}
.card-header{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.card-header h3{font-size:15px;font-weight:600;color:var(--primary);flex:1}
.card-header .arrow{font-size:12px;color:#aaa;transition:transform .3s;margin-left:8px}
.card-header .arrow.open{transform:rotate(90deg)}
.card-body{display:none;padding:0 16px 14px;border-top:1px solid var(--light)}
.card-body.open{display:block}
.info-row{margin-top:10px}
.info-label{font-size:11px;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.info-text{font-size:13px;color:#555;line-height:1.7}
.sign-tag{display:inline-block;background:#fef9e7;color:#d4a017;padding:2px 8px;border-radius:10px;font-size:11px;margin:2px 4px 2px 0;border:1px solid #f9e79f}
.feature-tag{display:inline-block;background:#eafaf1;color:#1e8449;padding:2px 8px;border-radius:10px;font-size:11px;margin:2px 4px 2px 0;border:1px solid #a9dfbf}
.empty{padding:40px 20px;text-align:center;color:#aaa;font-size:14px}
.empty-icon{font-size:48px;margin-bottom:12px}
.coming-soon{background:#fff3cd;border:1px dashed #ffc107;border-radius:12px;padding:20px;text-align:center;color:#856404;margin-bottom:12px}
.coming-soon .icon{font-size:32px;margin-bottom:8px}
.coming-soon .title{font-weight:600;margin-bottom:4px}

/* 空模块提示 */
.module-empty{padding:40px 20px;text-align:center}
.module-empty .module-icon{font-size:64px;margin-bottom:16px;opacity:.3}
.module-empty .module-title{font-size:18px;font-weight:600;color:#333;margin-bottom:8px}
.module-empty .module-desc{font-size:14px;color:#888;margin-bottom:16px}
.module-empty .module-count{font-size:12px;color:var(--accent)}

.back-top{position:fixed;right:16px;bottom:calc(24px + var(--safe-bottom));width:40px;height:40px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:18px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.2);display:none;z-index:200}
.back-top:hover{background:var(--primary)}

@media(min-width:768px){
.disease-list{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.stats{grid-column:1/-1}
}
</style>
</head>

// =============================================
// 分类配置 - 按系统
// =============================================
const MODULES = [
  { key: "all", label: "全部", icon: "📋", color: "" },
  { key: "brain", label: "🧠 中枢神经", icon: "🧠", color: "#6c5ce7" },
  { key: "head", label: "👁 头颈五官", icon: "👁", color: "#00b894" },
  { key: "lung", label: "🫁 呼吸系统", icon: "🫁", color: "#e17055" },
  { key: "abdomen", label: "🍽 消化系统", icon: "🍽", color: "#fdcb6e" },
  { key: "bone", label: "🦴 骨肌系统", icon: "🦴", color: "#74b9ff" },
  { key: "cardio", label: "❤️ 心血管", icon: "❤️", color: "#e84393" },
  { key: "breast", label: "🤝 乳腺", icon: "🤝", color: "#00cec9" }
];

// 按模块获取所有分类
function getCategories(module) {
  const categories = new Set();
  DATA.filter(d => module === "all" || d.module === module).forEach(d => {
    if (d.category) categories.add(d.category);
  });
  return [
    { key: "all", label: "全部" },
    ...[...categories].sort().map(c => ({ key: c, label: c }))
  ];
}

let activeModule = "all";
let activeTag = "all";

function init() {
  renderModuleNav();
  renderTags();
  renderList(DATA);
  updateStats();
  window.addEventListener("scroll", () => {
    document.getElementById("backTop").style.display = window.scrollY > 300 ? "block" : "none";
  });
}

function renderModuleNav() {
  const nav = document.getElementById("moduleNav");
  nav.innerHTML = MODULES.map(m => `
    <button class="module-btn ${m.key === activeModule ? 'active' : ''}" 
            data-module="${m.key}" 
            onclick="setModule('${m.key}')">${m.label}</button>
  `).join("");
}

function setModule(module) {
  activeModule = module;
  activeTag = "all";
  renderModuleNav();
  renderTags();
  filterCards();
}

function renderTags() {
  const c = document.getElementById("tags");
  const cats = getCategories(activeModule);
  c.innerHTML = cats.map(t => `
    <button class="tag ${t.key === activeTag ? 'active' : ''}" onclick="setTag('${t.key}')">${t.label}</button>
  `).join("");
}

function setTag(key) {
  activeTag = key;
  renderTags();
  filterCards();
}

function filterCards() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  let filtered = DATA;
  
  // 模块过滤
  if (activeModule !== "all") {
    filtered = filtered.filter(d => d.module === activeModule);
  }
  
  // 分类过滤
  if (activeTag !== "all") {
    filtered = filtered.filter(d => d.category === activeTag);
  }
  
  // 搜索过滤
  if (q) {
    filtered = filtered.filter(d => {
      const searchable = [d.name, d.subtitle, d.category, ...(d.keywords || []), ...(d.signs || []), ...(d.features || [])].join(" ").toLowerCase();
      return searchable.includes(q) || d.name.toLowerCase().includes(q);
    });
  }
  
  renderList(filtered);
  updateStats(filtered.length);
}

function updateStats(n) {
  const total = n !== undefined ? n : DATA.length;
  const moduleName = activeModule === "all" ? "" : MODULES.find(m => m.key === activeModule)?.label.replace(/^[🧠👁🫁🍽🦴❤️🤝]\s*/, "") + " ";
  document.getElementById("stats").textContent = `${moduleName}共 ${total} 种疾病`;
}

function renderList(data) {
  const c = document.getElementById("list");
  
  if (!data.length) {
    c.innerHTML = `
      <div class="module-empty">
        <div class="module-icon">🔍</div>
        <div class="module-title">没有找到匹配的疾病</div>
        <div class="module-desc">试试其他关键词或切换分类</div>
      </div>
    `;
    return;
  }
  
  c.innerHTML = data.map((d, i) => `
    <div class="disease-card" data-index="${i}">
      <div class="card-header" onclick="toggle(${i})">
        <h3>${d.name}</h3>
        <span class="arrow" id="arrow${i}">▶</span>
      </div>
      <div class="card-body" id="body${i}">
        ${d.subtitle ? `<div class="info-row"><div class="info-label">别名</div><div class="info-text" style="color:#888">${d.subtitle}</div></div>` : ""}
        ${d.age ? `<div class="info-row"><div class="info-label">好发年龄</div><div class="info-text">${d.age}</div></div>` : ""}
        ${d.types ? d.types.map(t => `<div class="info-row"><div class="info-label">分型</div><div class="info-text"><strong>${t.label}</strong>：${t.desc}</div></div>`).join("") : ""}
        ${d.signs && d.signs.length ? `<div class="info-row"><div class="info-label">影像征象</div><div class="info-text">${d.signs.map(s => `<span class="sign-tag">${s}</span>`).join("")}</div></div>` : ""}
        ${d.features && d.features.length ? `<div class="info-row"><div class="info-label">影像特征</div><div class="info-text"><ul style="padding-left:16px;margin:0">${d.features.map(f => `<li>${f}</li>`).join("")}</ul></div></div>` : ""}
      </div>
    </div>
  `).join("");
}

function toggle(i) {
  const body = document.getElementById("body" + i);
  const arrow = document.getElementById("arrow" + i);
  const isOpen = body.classList.contains("open");
  body.classList.toggle("open");
  arrow.classList.toggle("open");
  if (!isOpen) body.parentElement.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

init();
