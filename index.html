<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>影像诊断知识库</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="影像诊断">
<meta name="theme-color" content="#061827">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23061827'/><text x='50' y='67' font-size='48' text-anchor='middle' fill='white'>🫁</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#04111f;
  --bg2:#071a2f;
  --card:rgba(12,35,58,.72);
  --card2:rgba(255,255,255,.07);
  --line:rgba(93,220,255,.22);
  --cyan:#46e7ff;
  --blue:#2f8cff;
  --violet:#8c6cff;
  --text:#eaf7ff;
  --muted:#8eacc1;
  --danger:#ff6b8a;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --brain:#8c6cff;
  --head:#21e6c1;
  --lung:#ff8a65;
  --abdomen:#ffd166;
  --bone:#65c7ff;
  --cardio:#ff5fa2;
  --breast:#3ff4e8;
  --mediastinum:#7dd3fc;
  --retroperitoneum:#f59e0b;
  --spinalcanal:#a78bfa;
}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  min-height:100vh;color:var(--text);line-height:1.6;
  padding-top:var(--safe-top);padding-bottom:calc(var(--safe-bottom) + 36px);
  background:
    radial-gradient(circle at 20% 0%, rgba(70,231,255,.22), transparent 32%),
    radial-gradient(circle at 90% 10%, rgba(140,108,255,.20), transparent 30%),
    linear-gradient(180deg,#04111f 0%,#061827 45%,#020812 100%);
  overflow-x:hidden;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;opacity:.55;
  background-image:
    linear-gradient(rgba(70,231,255,.055) 1px, transparent 1px),
    linear-gradient(90deg, rgba(70,231,255,.055) 1px, transparent 1px);
  background-size:28px 28px;
  mask-image:linear-gradient(to bottom, #000 0%, transparent 85%);
}
body::after{
  content:"";position:fixed;left:0;right:0;top:-30%;height:40%;
  background:linear-gradient(180deg,transparent,rgba(70,231,255,.10),transparent);
  animation:scan 7s linear infinite;pointer-events:none;
}
@keyframes scan{to{top:110%}}
.app{position:relative;z-index:1;max-width:860px;margin:0 auto}
.hero{padding:22px 18px 12px;position:relative}
.title-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand h1{font-size:23px;letter-spacing:.5px;font-weight:800}
.brand p{font-size:12px;color:var(--muted);margin-top:3px;letter-spacing:.8px}
.status-pill{font-size:11px;color:#00131c;background:linear-gradient(135deg,var(--cyan),#b8f7ff);padding:7px 10px;border-radius:999px;font-weight:700;box-shadow:0 0 22px rgba(70,231,255,.32)}
.hero-panel{margin-top:18px;border:1px solid var(--line);background:linear-gradient(135deg,rgba(12,35,58,.74),rgba(7,26,47,.50));border-radius:24px;padding:16px;box-shadow:0 18px 50px rgba(0,0,0,.28), inset 0 0 40px rgba(70,231,255,.04);backdrop-filter:blur(14px)}
.search-box{position:relative}
.search-box input{width:100%;padding:14px 46px 14px 16px;border:1px solid rgba(70,231,255,.25);border-radius:18px;font-size:15px;background:rgba(1,12,22,.62);color:var(--text);outline:none;box-shadow:inset 0 0 18px rgba(70,231,255,.05)}
.search-box input::placeholder{color:#6f91a8}
.search-box input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(70,231,255,.11), inset 0 0 18px rgba(70,231,255,.08)}
.search-icon{position:absolute;right:15px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--cyan)}

.module-nav{display:flex;gap:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:14px 2px 2px;margin-top:4px;cursor:grab;user-select:none;scrollbar-width:none}
.module-nav::-webkit-scrollbar,.tags::-webkit-scrollbar{display:none}
.module-nav.dragging{cursor:grabbing}

.sub-nav{
  display:none;
  gap:9px;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  padding:0 18px 10px;
}
.sub-nav::-webkit-scrollbar{display:none}
.show-list .sub-nav.show{display:flex}
.sub-btn{
  flex:0 0 auto;
  border:1px solid rgba(70,231,255,.18);
  border-radius:999px;
  background:rgba(255,255,255,.06);
  color:#b9f4ff;
  padding:7px 14px;
  font-size:12px;
  cursor:pointer;
}
.sub-btn.active{
  background:linear-gradient(135deg,var(--cyan),#b8f7ff);
  color:#00131c;
  border-color:transparent;
  font-weight:800;
}

.module-btn{
  flex:0 0 auto;
  min-width:132px;
  border:1px solid rgba(255,255,255,.10);
  border-radius:18px;
  background:rgba(255,255,255,.055);
  color:var(--text);
  padding:11px 12px;
  text-align:left;
  cursor:pointer;
  transition:.22s;
  box-shadow:inset 0 0 24px rgba(255,255,255,.02);
  display:flex;
  align-items:center;
  gap:10px;
}
.module-btn .m-icon{
  flex:0 0 32px;
  width:32px;
  height:32px;
  border-radius:11px;
  display:grid;
  place-items:center;
  margin-bottom:0;
  color:var(--cyan);
  background:rgba(70,231,255,.10);
  border:1px solid rgba(70,231,255,.22);
  box-shadow:inset 0 0 14px rgba(70,231,255,.08);
}
.module-btn .m-icon svg{width:18px;height:18px;display:block;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.module-btn .m-text{display:flex;flex-direction:column;min-width:0}
.module-btn .m-label{display:block;font-size:13px;line-height:1.25;white-space:nowrap;font-weight:700}
.module-btn .m-count{display:block;font-size:10px;color:var(--muted);margin-top:2px;line-height:1.2}
.module-btn.active{border-color:rgba(70,231,255,.65);background:linear-gradient(135deg,rgba(70,231,255,.20),rgba(47,140,255,.14));box-shadow:0 0 22px rgba(70,231,255,.16),inset 0 0 28px rgba(70,231,255,.06)}
.module-btn.active .m-icon{color:#00131c;background:linear-gradient(135deg,var(--cyan),#b8f7ff);box-shadow:0 0 18px rgba(70,231,255,.25)}

.home{padding:8px 18px 96px}
.ct-card{position:relative;border:1px solid var(--line);border-radius:28px;min-height:280px;overflow:hidden;background:radial-gradient(circle at center,rgba(70,231,255,.10),rgba(8,28,48,.55) 52%,rgba(255,255,255,.04));box-shadow:0 18px 55px rgba(0,0,0,.32), inset 0 0 50px rgba(70,231,255,.06)}
.ct-core{position:absolute;left:50%;top:44%;width:170px;height:170px;transform:translate(-50%,-50%);border:1px solid rgba(70,231,255,.30);border-radius:50%;box-shadow:0 0 42px rgba(70,231,255,.12), inset 0 0 26px rgba(70,231,255,.08)}
.ct-core::before,.ct-core::after{content:"";position:absolute;inset:18px;border:1px dashed rgba(70,231,255,.45);border-radius:50%;animation:spin 16s linear infinite}
.ct-core::after{inset:42px;border-style:solid;border-color:rgba(140,108,255,.35);animation-duration:9s;animation-direction:reverse}
@keyframes spin{to{transform:rotate(360deg)}}
.scan-arm{position:absolute;left:50%;top:44%;width:2px;height:92px;background:linear-gradient(var(--cyan),transparent);transform-origin:bottom;animation:spin 4.5s linear infinite;filter:drop-shadow(0 0 8px var(--cyan))}
.ct-label{position:absolute;left:0;right:0;bottom:24px;text-align:center}
.ct-label strong{font-size:20px;letter-spacing:1px}
.ct-label span{display:block;font-size:12px;color:var(--muted);margin-top:4px}
.corner{position:absolute;width:58px;height:58px;border-color:rgba(70,231,255,.48);opacity:.8}
.c1{left:16px;top:16px;border-left:2px solid;border-top:2px solid;border-radius:18px 0 0 0}
.c2{right:16px;top:16px;border-right:2px solid;border-top:2px solid;border-radius:0 18px 0 0}
.c3{left:16px;bottom:16px;border-left:2px solid;border-bottom:2px solid;border-radius:0 0 0 18px}
.c4{right:16px;bottom:16px;border-right:2px solid;border-bottom:2px solid;border-radius:0 0 18px 0}

.dashboard{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.dash-card{border:1px solid rgba(255,255,255,.09);border-radius:20px;background:rgba(255,255,255,.055);padding:14px;min-height:94px;backdrop-filter:blur(12px)}
.dash-card b{font-size:22px;color:var(--cyan)}
.dash-card span{display:block;color:var(--muted);font-size:12px;margin-top:4px}
.wave{height:34px;margin-top:10px;background:repeating-linear-gradient(90deg,rgba(70,231,255,.2) 0 2px,transparent 2px 8px);mask-image:linear-gradient(90deg,transparent,#000,transparent)}

.tags{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 18px 12px;display:none}
.tag{flex-shrink:0;padding:6px 13px;border-radius:999px;font-size:12px;background:rgba(70,231,255,.10);color:#b9f4ff;border:1px solid rgba(70,231,255,.18)}
.tag.active{background:var(--cyan);color:#00202d;font-weight:700}
.stats{padding:0 18px 8px;font-size:12px;color:var(--muted);display:none}
.disease-list{padding:0 18px 90px;display:none}
.disease-card{
  position:relative;
  background:
    linear-gradient(135deg,rgba(70,231,255,.10),rgba(255,255,255,.045) 42%,rgba(140,108,255,.07)),
    rgba(5,19,34,.74);
  border:1px solid rgba(70,231,255,.16);
  border-radius:22px;
  margin-bottom:14px;
  overflow:hidden;
  backdrop-filter:blur(14px);
  box-shadow:0 14px 34px rgba(0,0,0,.24), inset 0 0 28px rgba(70,231,255,.035);
}
.disease-card::before{
  content:"";
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:3px;
  background:linear-gradient(180deg,var(--cyan),rgba(140,108,255,.9),transparent);
  box-shadow:0 0 18px rgba(70,231,255,.6);
}
.disease-card::after{
  content:"";
  position:absolute;
  right:-36px;
  top:-36px;
  width:98px;
  height:98px;
  border:1px solid rgba(70,231,255,.14);
  border-radius:50%;
  pointer-events:none;
}
.card-header{
  position:relative;
  padding:15px 15px 14px 17px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  cursor:pointer;
}
.card-title-wrap{flex:1;min-width:0}
.card-kicker{
  display:flex;
  align-items:center;
  gap:6px;
  margin-bottom:6px;
  color:#8cf1ff;
  font-size:10px;
  letter-spacing:.8px;
  text-transform:uppercase;
}
.card-kicker .dot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--cyan);
  box-shadow:0 0 10px var(--cyan);
}
.card-header h3{
  font-size:15px;
  font-weight:800;
  color:#f2fbff;
  line-height:1.42;
  letter-spacing:.1px;
}
.card-meta{
  margin-top:8px;
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
.meta-chip{
  display:inline-flex;
  align-items:center;
  max-width:100%;
  padding:3px 8px;
  border-radius:999px;
  background:rgba(255,255,255,.065);
  border:1px solid rgba(255,255,255,.08);
  color:#a9c7d8;
  font-size:11px;
  line-height:1.3;
}
.arrow{
  position:relative;
  flex:0 0 34px;
  width:34px;
  height:34px;
  border-radius:50%;
  display:grid;
  place-items:center;
  font-size:12px;
  color:#00131c;
  background:linear-gradient(135deg,var(--cyan),#8cf1ff);
  transition:.25s;
  margin-left:0;
  box-shadow:0 0 18px rgba(70,231,255,.26);
}
.arrow.open{transform:rotate(90deg)}
.card-body{
  display:none;
  padding:14px 15px 16px 17px;
  border-top:1px solid rgba(70,231,255,.12);
  background:
    linear-gradient(180deg,rgba(0,0,0,.14),rgba(0,0,0,.22)),
    repeating-linear-gradient(90deg,rgba(70,231,255,.025) 0 1px,transparent 1px 14px);
}
.card-body.open{display:block}
.info-section{
  position:relative;
  margin-bottom:13px;
  padding:12px 12px 11px;
  border-radius:16px;
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.065);
}
.info-section:last-child{margin-bottom:0}
.info-label{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:4px 10px;
  border-radius:999px;
  font-size:11px;
  font-weight:800;
  margin-bottom:8px;
  letter-spacing:.5px;
}
.info-label::before{
  content:"";
  width:5px;
  height:5px;
  border-radius:50%;
  background:currentColor;
  box-shadow:0 0 8px currentColor;
}
.info-text{font-size:13px;color:#d3e4ef;line-height:1.75}
.info-text ul{padding-left:18px}
.info-text li{margin-bottom:5px}
.info-section.clinical .info-label{background:rgba(33,230,193,.14);color:#65ffe1}
.info-section.signs .info-label{background:rgba(255,209,102,.14);color:#ffe29a}
.info-section.features .info-label{background:rgba(70,231,255,.14);color:#8cf1ff}
.info-section.pathology .info-label{background:rgba(140,108,255,.16);color:#c7b8ff}
.info-section.differential .info-label{background:rgba(255,107,138,.16);color:#ff9bb1}
.sign-tag,.pathology-tag{
  display:inline-block;
  padding:5px 10px;
  border-radius:999px;
  font-size:12px;
  margin:4px 5px 4px 0;
  background:rgba(255,209,102,.12);
  color:#ffe29a;
  border:1px solid rgba(255,209,102,.20);
  box-shadow:inset 0 0 14px rgba(255,209,102,.04);
}
.differential-item{
  background:rgba(255,255,255,.055);
  border:1px solid rgba(255,107,138,.12);
  border-left:3px solid var(--danger);
  padding:10px 11px;
  margin-bottom:9px;
  border-radius:0 14px 14px 0;
}
.differential-item strong{color:#ff9bb1;font-size:13px}
.diff-text{font-size:12px;color:#cbd9e2;margin-top:4px;line-height:1.65}

.module-empty{grid-column:1/-1;text-align:center;padding:44px 20px;color:var(--muted)}
.back-top{position:fixed;right:16px;bottom:calc(22px + var(--safe-bottom));width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--blue));color:#00131c;border:none;font-size:18px;font-weight:900;box-shadow:0 0 24px rgba(70,231,255,.26);display:none;z-index:20}
.show-list .home{display:none}
.show-list .tags,.show-list .stats,.show-list .disease-list{display:flex}
.show-list .disease-list{display:block}
/* ========== 响应式布局 ========== */
/* 平板：≥768px */
@media (min-width: 768px) {
  .app { max-width: 1100px; }
  .hero { padding: 28px 32px 18px; }
  .brand h1 { font-size: 28px; }
  .brand p { font-size: 13px; }
  .hero-panel { padding: 20px; }
  .search-box input { font-size: 16px; padding: 15px 50px 15px 18px; }
  .module-nav { gap: 12px; padding: 16px 4px 4px; }
  .module-btn { min-width: 150px; padding: 13px 16px; }
  .module-btn .m-icon { flex:0 0 36px; width:36px; height:36px; }
  .module-btn .m-icon svg { width:20px; height:20px; }
  .module-btn .m-label { font-size: 14px; }
  .disease-list {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    padding: 0 24px 90px;
  }
  .show-list .disease-list { display: grid; }
  .home { padding: 14px 24px 96px; }
  .ct-card { min-height: 320px; }
  .ct-label strong { font-size: 24px; }
  .dashboard { gap: 14px; }
  .dash-card { padding: 18px; min-height: 100px; }
  .dash-card b { font-size: 26px; }
  .tags { padding: 0 24px 12px; }
  .stats { padding: 0 24px 8px; }
}

/* 电脑：≥1024px */
@media (min-width: 1024px) {
  .app { max-width: 1400px; }
  .hero { padding: 32px 48px 20px; }
  .brand h1 { font-size: 32px; }
  .brand p { font-size: 14px; letter-spacing: 1.2px; }
  .status-pill { font-size: 12px; padding: 8px 14px; }
  .hero-panel { padding: 24px; border-radius: 28px; }
  .search-box input { font-size: 17px; padding: 16px 52px 16px 20px; border-radius: 22px; }
  .search-icon { font-size: 20px; right: 18px; }
  /* 系统导航：电脑上可换行，不只能横滑 */
  .module-nav {
    flex-wrap: wrap;
    overflow-x: visible;
    gap: 14px;
    padding: 16px 4px 6px;
    cursor: default;
  }
  .module-nav.dragging { cursor: default; }
  .module-btn { min-width: 170px; padding: 14px 18px; border-radius: 20px; }
  .module-btn .m-icon { flex:0 0 40px; width:40px; height:40px; border-radius: 13px; }
  .module-btn .m-icon svg { width:22px; height:22px; }
  .module-btn .m-label { font-size: 15px; }
  .module-btn .m-count { font-size: 11px; }
  .disease-list {
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    padding: 0 32px 90px;
  }
  .home { padding: 18px 32px 96px; }
  .ct-card { min-height: 360px; border-radius: 32px; }
  .ct-core { width: 220px; height: 220px; }
  .scan-arm { height: 118px; }
  .ct-label strong { font-size: 28px; }
  .ct-label span { font-size: 13px; }
  .corner { width: 66px; height: 66px; }
  .c1 { left:20px; top:20px; border-radius: 22px 0 0 0; }
  .c2 { right:20px; top:20px; border-radius: 0 22px 0 0; }
  .c3 { left:20px; bottom:20px; border-radius: 0 0 0 22px; }
  .c4 { right:20px; bottom:20px; border-radius: 0 0 22px 0; }
  .dashboard { gap: 16px; }
  .dash-card { padding: 20px; min-height: 110px; border-radius: 24px; }
  .dash-card b { font-size: 30px; }
  .dash-card span { font-size: 13px; }
  .wave { height: 38px; }
  .sub-nav { padding: 0 32px 10px; }
  .tags { padding: 0 32px 12px; gap: 10px; }
  .stats { padding: 0 32px 8px; }
}

/* 大屏：≥1400px */
@media (min-width: 1400px) {
  .disease-list {
    grid-template-columns: repeat(4, 1fr);
  }
}

/* 手机横屏适配 */
@media (max-width: 767px) and (orientation: landscape) {
  .hero { padding: 12px 18px 8px; }
  .hero-panel { margin-top: 10px; padding: 12px; }
  .ct-card { min-height: 180px; }
  .ct-core { width: 100px; height: 100px; top: 40%; }
  .scan-arm { height: 50px; top: 40%; }
  .ct-label { bottom: 12px; }
  .ct-label strong { font-size: 16px; }
  .dashboard { grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .dash-card { min-height: 70px; padding: 10px; }
  .dash-card b { font-size: 18px; }
  .dash-card span { font-size: 11px; }
  .wave { height: 20px; margin-top: 6px; }
}

/* ========== .show-list 浅色模式 响应式 ========== */
@media (min-width: 768px) {
  body.show-list .hero { padding: 20px 32px 16px; }
  body.show-list .hero-panel { padding: 20px; border-radius: 28px; }
  body.show-list .brand h1 { font-size: 28px; }
  body.show-list .brand p { font-size: 13px; }
  body.show-list .search-box input { font-size: 16px; padding: 15px 50px 15px 18px; border-radius: 22px; }
  body.show-list .module-btn { padding: 13px 16px; min-width: 150px; }
  body.show-list .module-btn .m-icon { width: 36px; height: 36px; }
  body.show-list .sub-btn,
  body.show-list .tag { padding: 8px 16px; font-size: 13px; }
}

@media (min-width: 1024px) {
  body.show-list .hero { padding: 24px 48px 18px; }
  body.show-list .hero-panel { padding: 24px; border-radius: 32px; }
  body.show-list .brand h1 { font-size: 32px; }
  body.show-list .brand p { font-size: 14px; }
  body.show-list .search-box input { font-size: 17px; padding: 16px 52px 16px 20px; border-radius: 24px; }
  body.show-list .module-nav { flex-wrap: wrap; overflow-x: visible; }
  body.show-list .module-btn { padding: 14px 18px; min-width: 170px; border-radius: 20px; }
  body.show-list .module-btn .m-icon { width: 40px; height: 40px; border-radius: 13px; }
  body.show-list .module-btn .m-label { font-size: 15px; }
  body.show-list .sub-btn,
  body.show-list .tag { padding: 9px 18px; font-size: 13px; border-radius: 999px; }
  body.show-list .card-header h3 { font-size: 16px; }
  body.show-list .card-kicker { font-size: 11px; }
  body.show-list .meta-chip { font-size: 12px; padding: 4px 10px; }

function normalizeModuleKey(key){
  if(key === "musculoskeletal") return "bone";
  if(key === "mediastinal") return "mediastinum";
  if(key === "retroperitoneal") return "retroperitoneum";
  if(key === "spine_canal" || key === "spinal_canal") return "spinalcanal";
  return key;
}
DATA.forEach(d => d.module = normalizeModuleKey(d.module));

function countByModule(key){
  if(key === "all") return DATA.length;
  return DATA.filter(d => d.module === key).length;
}

function cleanModuleLabel(label){
  return String(label || "").replace(/�/g, "").trim();
}

function getCategories(module) {
  const categories = new Set();
  DATA.filter(d => module === "all" || d.module === module).forEach(d => {
    if (d.category) categories.add(d.category);
  });
  return [
    { key: "all", label: "全部" },
    ...[...categories].sort().map(c => ({ key: c, label: c }))
  ];
}

  { key: "shoulder", label: "肩关节" },
  { key: "ankle", label: "踝关节" },
  { key: "hand", label: "手关节" },
  { key: "wrist", label: "腕关节" },
  { key: "spine", label: "脊柱关节" }
];


function isTumorDisease(d) {
  const text = [d.name, d.category].join(" ");
  return /肿瘤|肉瘤|瘤|转移瘤|淋巴瘤|脊索瘤|浆细胞瘤|造釉细胞瘤/.test(text);
}

function isJointDisease(d) {
  const text = [d.name, d.category, ...(d.clinical || []), ...(d.signs || []), ...(d.features || [])].join(" ");
  // 关节系统只收录明确的关节疾病；凡名称/分类属于肿瘤者，一律不进入关节。
  return !isTumorDisease(d) && /关节|膝|髋|肩|踝|腕|手关节|脊柱关节|椎间小关节|骶髂|滑膜|半月板|韧带|软骨损伤|骨关节炎|关节炎|关节积液/.test(text);
}

function inferBoneLevel2(d) {
  if (isJointDisease(d)) return "joint";
  return "tumor";
}

function inferBoneLevel3(d) {
  if (!isJointDisease(d)) return "none";
  const text = [d.name, d.category, ...(d.clinical || []), ...(d.signs || []), ...(d.features || [])].join(" ");
  if (/膝|半月板|交叉韧带/.test(text)) return "knee";
  if (/髋|股骨头|髋臼/.test(text)) return "hip";
  if (/肩|肩袖|盂唇|肱二头肌长头/.test(text)) return "shoulder";
  if (/踝|距骨|跟腱/.test(text)) return "ankle";
  if (/腕|腕管|舟骨|月骨/.test(text)) return "wrist";
  if (/手|指|掌骨|指骨/.test(text)) return "hand";
  if (/脊柱|椎|椎间盘|小关节|骶髂/.test(text)) return "spine";
  return "all";
}


function enableMouseDragScroll(el) {
  if (!el || el.dataset.dragScrollReady === "1") return;
  el.dataset.dragScrollReady = "1";
  let isDown = false;
  let startX = 0;
  let scrollLeft = 0;
  let moved = false;

  el.addEventListener("mousedown", (e) => {
    isDown = true;
    moved = false;
    el.classList.add("dragging");
    startX = e.pageX - el.offsetLeft;
    scrollLeft = el.scrollLeft;
  });

  el.addEventListener("mouseleave", () => {
    isDown = false;
    el.classList.remove("dragging");
  });

  el.addEventListener("mouseup", (e) => {
    isDown = false;
    el.classList.remove("dragging");
    if (moved) {
      e.preventDefault();
      e.stopPropagation();
    }
  });

  el.addEventListener("mousemove", (e) => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - el.offsetLeft;
    const walk = (x - startX) * 1.2;
    if (Math.abs(walk) > 4) moved = true;
    el.scrollLeft = scrollLeft - walk;
  });

  // 防止鼠标拖动后误触发系统按钮点击
  el.addEventListener("click", (e) => {
    if (moved) {
      e.preventDefault();
      e.stopPropagation();
      moved = false;
    }
  }, true);
}

function init() {
  document.getElementById("totalCount").textContent = DATA.length;
  renderModuleNav();
  enableMouseDragScroll(document.getElementById("moduleNav"));
  renderBoneSubNav();
  renderTags();
  renderList([]);
  updateStats(0);
  window.addEventListener("scroll", () => {
    document.getElementById("backTop").style.display = window.scrollY > 300 ? "block" : "none";
  });
}


function moduleIconSvg(key) {
  const icons = {
    all: '<svg viewBox="0 0 24 24"><rect x="4" y="4" width="6" height="6"/><rect x="14" y="4" width="6" height="6"/><rect x="4" y="14" width="6" height="6"/><rect x="14" y="14" width="6" height="6"/></svg>',
    brain: '<svg viewBox="0 0 24 24"><path d="M9 4a4 4 0 0 0-4 4v1a3 3 0 0 0 0 6v1a4 4 0 0 0 4 4"/><path d="M15 4a4 4 0 0 1 4 4v1a3 3 0 0 1 0 6v1a4 4 0 0 1-4 4"/><path d="M12 5v14"/><path d="M8 9h2M14 9h2M8 15h2M14 15h2"/></svg>',
    head: '<svg viewBox="0 0 24 24"><path d="M3 12s3.5-6 9-6 9 6 9 6-3.5 6-9 6-9-6-9-6z"/><circle cx="12" cy="12" r="3"/></svg>',
    lung: '<svg viewBox="0 0 24 24"><path d="M12 4v16"/><path d="M12 10c-3-4-6-4-7 0-1 4 0 8 4 9 2 .5 3-1 3-3z"/><path d="M12 10c3-4 6-4 7 0 1 4 0 8-4 9-2 .5-3-1-3-3z"/></svg>',
    abdomen: '<svg viewBox="0 0 24 24"><path d="M8 4h8c2 3 3 6 3 9 0 5-3 8-7 8s-7-3-7-8c0-3 1-6 3-9z"/><path d="M9 12h6M9 16h6"/></svg>',
    bone: '<svg viewBox="0 0 24 24"><path d="M7 8a3 3 0 1 1 4-4l9 9a3 3 0 1 1-4 4l-9-9z"/><path d="M8 16a3 3 0 1 0-4 4 3 3 0 0 0 4-4z"/><path d="M16 8a3 3 0 1 1 4-4 3 3 0 0 1-4 4z"/></svg>',
    cardio: '<svg viewBox="0 0 24 24"><path d="M20 9c0 6-8 11-8 11S4 15 4 9a4 4 0 0 1 7-2 4 4 0 0 1 9 2z"/><path d="M4 13h4l2-3 3 6 2-3h5"/></svg>',
    breast: '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="2"/><path d="M12 4v3M12 17v3M4 12h3M17 12h3"/></svg>'
  };
  return icons[key] || icons.all;
}

function renderModuleNav() {
  const nav = document.getElementById("moduleNav");
  nav.innerHTML = MODULES.map(m => `
    <button class="module-btn ${m.key === activeModule ? 'active' : ''}" onclick="setModule('${m.key}')">
      <span class="m-icon">${moduleIconSvg(m.key)}</span>
      <span class="m-text">
        <span class="m-label">${cleanModuleLabel(m.label)}</span>
        <span class="m-count">${countByModule(m.key)} items</span>
      </span>
    </button>
  `).join("");
}

function setModule(module) {
  activeModule = module;
  activeTag = "all";
  activeBoneLevel2 = "all";
  activeBoneLevel3 = "all";
  document.getElementById("search").value = "";
  document.body.classList.add("show-list");
  renderModuleNav();
  enableMouseDragScroll(document.getElementById("moduleNav"));
  renderBoneSubNav();
  renderTags();
  filterCards();
}

function renderBoneSubNav() {
  const level2 = document.getElementById("boneLevel2");
  const level3 = document.getElementById("boneLevel3");
  if (!level2 || !level3) return;

  if (activeModule !== "bone") {
    level2.classList.remove("show");
    level3.classList.remove("show");
    level2.innerHTML = "";
    level3.innerHTML = "";
    return;
  }

  level2.classList.add("show");
  level2.innerHTML = BONE_LEVEL2.map(t => `
    <button class="sub-btn ${t.key === activeBoneLevel2 ? 'active' : ''}" onclick="setBoneLevel2('${t.key}')">${t.label}</button>
  `).join("");

  if (activeBoneLevel2 === "joint") {
    level3.classList.add("show");
    level3.innerHTML = BONE_LEVEL3_JOINT.map(t => `
      <button class="sub-btn ${t.key === activeBoneLevel3 ? 'active' : ''}" onclick="setBoneLevel3('${t.key}')">${t.label}</button>
    `).join("");
  } else {
    level3.classList.remove("show");
    level3.innerHTML = "";
  }
}

function setBoneLevel2(key) {
  activeBoneLevel2 = key;
  activeBoneLevel3 = "all";
  activeTag = "all";
  renderBoneSubNav();
  renderTags();
  filterCards();
}

function setBoneLevel3(key) {
  activeBoneLevel3 = key;
  activeTag = "all";
  renderBoneSubNav();
  renderTags();
  filterCards();
}

function renderTags() {
  const c = document.getElementById("tags");

  // 点击“骨肌系统 > 关节”后，隐藏通用疾病分类标签。
  // 否则这里会继续显示骨肌系统全部分类，如“良性骨肿瘤、恶性骨肿瘤”等，造成误解。
  if (activeModule === "bone" && activeBoneLevel2 === "joint") {
    activeTag = "all";
    c.innerHTML = "";
    return;
  }

  const cats = getCategories(activeModule);
  c.innerHTML = cats.map(t => `
    <button class="tag ${t.key === activeTag ? 'active' : ''}" onclick="setTag('${String(t.key).replace(/'/g, "\\'")}')">${t.label}</button>
  `).join("");
}

function setTag(key) {
  activeTag = key;
  renderTags();
  filterCards();
}

function filterCards() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  if(q) document.body.classList.add("show-list");
  let filtered = DATA;
  if (activeModule !== "all") filtered = filtered.filter(d => d.module === activeModule);

  if (activeModule === "bone" && activeBoneLevel2 !== "all") {
    filtered = filtered.filter(d => inferBoneLevel2(d) === activeBoneLevel2);
    if (activeBoneLevel2 === "joint") {
      filtered = filtered.filter(d => isJointDisease(d));
      if (activeBoneLevel3 !== "all") {
        filtered = filtered.filter(d => inferBoneLevel3(d) === activeBoneLevel3);
      }
    }
  }

  if (activeTag !== "all") filtered = filtered.filter(d => d.category === activeTag);
  if (q) {
    filtered = filtered.filter(d => {
      const searchable = [
        d.name, d.category,
        ...(d.clinical || []), ...(d.signs || []), ...(d.features || []),
        ...(d.pathology || []),
        ...(Object.keys(d.differential || {})), ...(Object.values(d.differential || {}))
      ].join(" ").toLowerCase();
      return searchable.includes(q);
    });
  }
  if(!q && activeModule === "all" && activeTag === "all") {
    document.body.classList.remove("show-list");
    renderModuleNav();
    renderBoneSubNav();
    return;
  }
  renderList(filtered);
  updateStats(filtered.length);
}

function updateStats(n) {
  let moduleName = activeModule === "all" ? "全部系统" : (MODULES.find(m => m.key === activeModule)?.label || "");
  if (activeModule === "bone" && activeBoneLevel2 !== "all") {
    moduleName += " / " + (BONE_LEVEL2.find(x => x.key === activeBoneLevel2)?.label || "");
    if (activeBoneLevel2 === "joint" && activeBoneLevel3 !== "all") {
      moduleName += " / " + (BONE_LEVEL3_JOINT.find(x => x.key === activeBoneLevel3)?.label || "");
    }
  }
  document.getElementById("stats").textContent = `${moduleName} · 共 ${n} 种疾病`;
}

function renderList(data) {
  lastRendered = data;
  const c = document.getElementById("list");
  if (!data.length) {
    const moduleLabel = activeModule === "all" ? "" : cleanModuleLabel(MODULES.find(m => m.key === activeModule)?.label || "");
    const isEmptyNewSystem = ["mediastinum", "retroperitoneum", "spinalcanal"].includes(activeModule);
    c.innerHTML = `
      <div class="module-empty">
        <div style="font-size:54px;margin-bottom:10px">⌕</div>
        <div style="font-size:17px;font-weight:700">${isEmptyNewSystem ? moduleLabel + "系统已建立" : "没有找到匹配内容"}</div>
        <div style="font-size:13px;margin-top:6px">${isEmptyNewSystem ? "当前暂无条目，后续可在 DATA 中添加 module 对应内容" : "试试其他关键词，或切换系统分类"}</div>
      </div>`;
    return;
  }
  c.innerHTML = data.map((d, i) => `
    <div class="disease-card">
      <div class="card-header" onclick="toggle(${i})">
        <div class="card-title-wrap">
          <div class="card-kicker"><span class="dot"></span><span>${d.module || 'imaging'} · ${String(i + 1).padStart(2, '0')}</span></div>
          <h3>${d.name}</h3>
          <div class="card-meta">
            ${d.category ? `<span class="meta-chip">${d.category}</span>` : ""}
            ${d.signs?.length ? `<span class="meta-chip">${d.signs.length} 个征象</span>` : ""}
            ${d.differential && Object.keys(d.differential).length ? `<span class="meta-chip">${Object.keys(d.differential).length} 项鉴别</span>` : ""}
          </div>
        </div>
        <span class="arrow" id="arrow${i}">▶</span>
      </div>
      <div class="card-body" id="body${i}">
        ${d.clinical?.length ? `<div class="info-section clinical"><div class="info-label">临床概述</div><div class="info-text"><ul>${d.clinical.map(x=>`<li>${x}</li>`).join("")}</ul></div></div>` : ""}
        ${d.signs?.length ? `<div class="info-section signs"><div class="info-label">影像征象</div><div class="info-text">${d.signs.map(x=>`<span class="sign-tag">${x}</span>`).join("")}</div></div>` : ""}
        ${d.features?.length ? `<div class="info-section features"><div class="info-label">影像特征</div><div class="info-text"><ul>${d.features.map(x=>`<li>${x}</li>`).join("")}</ul></div></div>` : ""}
        ${d.pathology?.length ? `<div class="info-section pathology"><div class="info-label">病理特点</div><div class="info-text"><ul>${d.pathology.map(x=>`<li>${x}</li>`).join("")}</ul></div></div>` : ""}
        ${d.differential && Object.keys(d.differential).length ? `<div class="info-section differential"><div class="info-label">鉴别诊断</div><div class="info-text">${Object.entries(d.differential).map(([k,v])=>`<div class="differential-item"><strong>${k}</strong><div class="diff-text">${v}</div></div>`).join("")}</div></div>` : ""}
      </div>
    </div>
  `).join("");
}

function toggle(i) {
  const body = document.getElementById("body" + i);
  const arrow = document.getElementById("arrow" + i);
  if(!body || !arrow) return;
  const isOpen = body.classList.contains("open");
  body.classList.toggle("open");
  arrow.classList.toggle("open");
  if (!isOpen) body.parentElement.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

init();
</script>
