<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>影像诊断知识库 · 仁慈医院放射科</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="影像诊断">
<meta name="theme-color" content="#06111f">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06111f;
  --panel:rgba(12,31,52,.78);
  --line:rgba(92,212,255,.24);
  --text:#e9f8ff;
  --muted:#8fb6c9;
  --cyan:#42d9ff;
  --cyan2:#00f0ff;
  --green:#4dffbf;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --brain:#6c5ce7;
  --head:#00b894;
  --lung:#e17055;
  --abdomen:#fdcb6e;
  --bone:#74b9ff;
  --cardio:#e84393;
  --breast:#00cec9;
  --retroperitoneum:#8e44ad;
  --spine:#16a085;
}
body{
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 70% 18%,rgba(66,217,255,.18),transparent 30%),
    radial-gradient(circle at 20% 70%,rgba(63,124,255,.14),transparent 32%),
    linear-gradient(145deg,#04101d 0%,#06111f 44%,#0b1f33 100%);
  overflow-x:hidden;
  padding-bottom:calc(30px + var(--safe-bottom));
}
body:before{
  content:"";
  position:fixed;inset:0;pointer-events:none;opacity:.20;z-index:0;
  background-image:
    linear-gradient(rgba(66,217,255,.14) 1px,transparent 1px),
    linear-gradient(90deg,rgba(66,217,255,.14) 1px,transparent 1px);
  background-size:42px 42px;
  -webkit-mask-image:radial-gradient(circle at 50% 40%,#000,transparent 75%);
  mask-image:radial-gradient(circle at 50% 40%,#000,transparent 75%);
}

/* ===== Hero头部 ===== */
.hero{
  position:relative;overflow:hidden;
  border:1px solid var(--line);border-radius:24px;
  margin:20px 18px 0;
  padding:28px 24px 20px;
  background:linear-gradient(135deg,rgba(10,31,54,.92),rgba(8,20,36,.82));
  box-shadow:0 18px 60px rgba(0,0,0,.38);
}
.hero:before{content:"";position:absolute;right:-100px;top:-90px;width:320px;height:320px;border-radius:50%;border:1px solid rgba(66,217,255,.22);box-shadow:0 0 80px rgba(66,217,255,.12) inset,0 0 80px rgba(66,217,255,.08)}
.hero:after{content:"";position:absolute;right:20px;bottom:10px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(66,217,255,.14) 0 2px,transparent 3px),radial-gradient(circle at center,transparent 42%,rgba(66,217,255,.16) 43%,transparent 44%,transparent 58%,rgba(66,217,255,.20) 59%,transparent 60%);background-size:22px 22px,100% 100%;opacity:.55;filter:drop-shadow(0 0 18px rgba(66,217,255,.28))}
.scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan2),transparent);animation:scan 3.2s linear infinite;opacity:.7;z-index:2;top:0}
@keyframes scan{0%{top:0}100%{top:100%}}

.hero-inner{position:relative;z-index:2}
.hero-en{font-size:11px;letter-spacing:4px;color:var(--cyan);text-transform:uppercase;margin-bottom:4px;font-weight:300}
.hero-title{font-size:clamp(24px,5vw,40px);line-height:1.15;letter-spacing:1px;margin-top:10px;font-weight:700;max-width:600px}
.hero-sub{margin-top:8px;color:var(--muted);font-size:13px;letter-spacing:1px}

/* ===== 模块导航 ===== */
.module-nav{
  position:relative;z-index:2;
  display:flex;gap:8px;overflow-x:auto;
  padding:14px 4px 6px;margin-top:6px;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
}
.module-nav::-webkit-scrollbar{display:none}
.module-btn{
  flex-shrink:0;padding:7px 15px;border-radius:999px;
  font-size:12px;cursor:pointer;
  border:1px solid rgba(66,217,255,.22);
  background:rgba(13,34,57,.68);color:var(--muted);
  transition:.2s;white-space:nowrap;
}
.module-btn:hover{border-color:rgba(66,217,255,.55);color:#fff}
.module-btn.active{color:#03111d;background:linear-gradient(135deg,var(--cyan),var(--green));border-color:transparent;box-shadow:0 0 22px rgba(66,217,255,.22)}

/* ===== 搜索框 ===== */
.search-wrap{position:relative;margin-top:12px;position:relative;z-index:2}
.search-wrap input{
  width:100%;height:48px;border-radius:16px;
  border:1px solid rgba(66,217,255,.30);
  background:rgba(8,24,42,.86);color:var(--text);
  outline:none;padding:0 16px 0 44px;font-size:14px;
  box-shadow:inset 0 0 20px rgba(66,217,255,.03);
  transition:.2s;
}
.search-wrap input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(66,217,255,.10),inset 0 0 20px rgba(66,217,255,.06)}
.search-wrap input::placeholder{color:rgba(233,248,255,.35)}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--cyan);font-size:15px;pointer-events:none}

/* ===== 固定欢迎页 ===== */
.welcome{
  margin:20px 18px 0;
  border:1px solid var(--line);border-radius:22px;
  background:linear-gradient(160deg,rgba(10,31,54,.88),rgba(8,20,36,.78));
  padding:0;position:relative;overflow:hidden;
  min-height:280px;
}
.welcome:before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 4px,rgba(66,217,255,.03) 4px,rgba(66,217,255,.03) 5px);
  pointer-events:none;
}
.welcome-inner{
  position:relative;z-index:1;
  display:grid;
  grid-template-columns:1fr 260px;
  gap:24px;align-items:start;
  padding:28px 28px;
}
.welcome-main{}
.welcome-badge{
  font-size:11px;letter-spacing:3px;
  color:var(--cyan);margin-bottom:6px;
  font-weight:600;text-transform:uppercase;
}
.welcome-heading{
  font-size:clamp(20px,4vw,28px);
  font-weight:700;color:#fff;
  line-height:1.2;
}
.welcome-lead{
  font-size:13px;color:var(--muted);
  line-height:1.8;margin-top:10px;
  max-width:460px;
}
.welcome-tags{
  display:flex;gap:6px;flex-wrap:wrap;
  margin-top:16px;
}
.w-tag{
  font-size:11px;padding:3px 9px;
  border:1px solid rgba(66,217,255,.18);
  border-radius:999px;color:var(--muted);
  background:rgba(255,255,255,.03);
}
.welcome-side{
  display:flex;flex-direction:column;gap:10px;
  padding-top:6px;
}
.w-stat-card{
  display:flex;align-items:center;gap:12px;
  border:1px solid rgba(66,217,255,.16);
  border-radius:14px;
  padding:12px 14px;
  background:rgba(7,20,35,.50);
  backdrop-filter:blur(6px);
  transition:.2s;
}
.w-stat-card:hover{border-color:rgba(66,217,255,.35)}
.w-stat-icon{font-size:22px;line-height:1}
.w-stat-body{}
.w-stat-num{font-size:18px;font-weight:700;color:#fff}
.w-stat-label{font-size:11px;color:var(--muted);margin-top:1px;letter-spacing:.5px}

/* ===== 疾病列表 ===== */
.disease-list{padding:16px 18px 100px;display:none;columns:2 280px;column-gap:12px}
.disease-list.show{display:block}
.disease-list.show .disease-card{display:inline-block;width:100%;break-inside:avoid;vertical-align:top}



.disease-card{
  background:#ffffff;
  border:1px solid rgba(0,0,0,.08);
  border-radius:18px;margin-bottom:12px;
  box-shadow:0 4px 20px rgba(0,0,0,.10);
  overflow:hidden;transition:transform .2s;
}
.disease-card:hover{transform:translateY(-1px);border-color:rgba(66,217,255,.4);box-shadow:0 6px 24px rgba(0,0,0,.13)}
.card-header{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;background:linear-gradient(135deg,rgba(66,217,255,.06),rgba(77,255,191,.04));border-bottom:1px solid rgba(0,0,0,.06)}
.card-header h3{font-size:15px;font-weight:700;color:#0a1f36;flex:1}
.card-header .arrow{font-size:12px;color:#8fb6c9;transition:transform .3s;margin-left:8px}
.card-header .arrow.open{transform:rotate(90deg)}
.card-body{display:none;padding:10px 16px 14px;border-top:1px solid rgba(0,0,0,.06);background:#ffffff}
.card-body.open{display:block}
.info-row{margin-top:10px}
.info-label{font-size:11px;font-weight:700;letter-spacing:.5px;margin-bottom:4px;text-transform:uppercase}
/* 各字段标签颜色在浅色背景下改用深色系 */
.info-label{color:#0a1f36}
.info-text{font-size:13px;color:#2d3748;line-height:1.75}
.sign-tag{display:inline-block;background:#fef9e7;color:#b8860b;padding:2px 8px;border-radius:10px;font-size:11px;margin:2px 4px 2px 0;border:1px solid #f0d060}
.feature-tag{display:inline-block;background:#e6f9f0;color:#0d7a4f;padding:2px 8px;border-radius:10px;font-size:11px;margin:2px 4px 2px 0;border:1px solid #4dffbf}
.clinical-tag{display:inline-block;background:#fff0f3;color:#c2185b;padding:2px 8px;border-radius:10px;font-size:11px;margin:2px 4px 2px 0;border:1px solid #ff6b8a}
.pathology-tag{display:inline-block;background:#f3e5f5;color:#6a1b9a;padding:2px 8px;border-radius:10px;font-size:11px;margin:2px 4px 2px 0;border:1px solid #ba68c8}
.imaging-tag{display:inline-block;background:#e0f7fa;color:#006064;padding:2px 8px;border-radius:10px;font-size:11px;margin:2px 4px 2px 0;border:1px solid #4dd0e1}
.empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:14px}

.back-top{
  position:fixed;right:18px;bottom:calc(20px + var(--safe-bottom));
  width:44px;height:44px;border-radius:50%;
  border:1px solid rgba(66,217,255,.40);
  background:rgba(8,24,42,.88);color:var(--cyan);
  font-size:18px;box-shadow:0 0 20px rgba(66,217,255,.15);
  cursor:pointer;display:none;z-index:30;
}

@media(max-width:900px){
  .welcome-inner{grid-template-columns:1fr}
  .welcome-side{flex-direction:row;flex-wrap:wrap}
}
@media(max-width:600px){
  .hero{padding:20px 16px 16px;margin:12px 10px 0}
  .hero-title{font-size:22px}
  .welcome{padding:0;margin:16px 10px 0}
  .welcome-inner{padding:22px 18px}
  .disease-list{padding:12px 10px 100px}
  .w-stat-card{min-width:90px;padding:10px 12px}
}
</style>
</head>
<body>

<div class="hero">
  <div class="scan-line"></div>
  <div class="hero-inner">
    <div class="hero-en">RADIOLOGY . MEDICAL IMAGING</div>
    <div class="hero-title">影像诊断知识检索</div>
    <div class="hero-sub">仁慈医院 . 放射科</div>
  </div>

  <div class="module-nav" id="moduleNav">
    <button class="module-btn active" data-module="all" onclick="setModule('all')">全部</button>
    <button class="module-btn" data-module="brain" onclick="setModule('brain')">. 中枢神经</button>
    <button class="module-btn" data-module="head" onclick="setModule('head')">. 头颈五官</button>
    <button class="module-btn" data-module="respiratory" onclick="setModule('respiratory')">. 呼吸系统</button>
    <button class="module-btn" data-module="mediastinum" onclick="setModule('mediastinum')">. 纵隔</button>
    <button class="module-btn" data-module="abdomen" onclick="setModule('abdomen')">. 消化系统</button>
    <button class="module-btn" data-module="retroperitoneum" onclick="setModule('retroperitoneum')">. 腹膜后</button>
    <button class="module-btn" data-module="bone" onclick="setModule('bone')">. 骨肌系统</button>
    <button class="module-btn" data-module="spine" onclick="setModule('spine')">. 椎管</button>
    <button class="module-btn" data-module="cardio" onclick="setModule('cardio')">. 心血管</button>
    <button class="module-btn" data-module="breast" onclick="setModule('breast')">. 乳腺</button>
  </div>

  <div class="search-wrap">
    <span class="search-icon">&#8981;</span>
    <input type="text" id="search" placeholder="搜索疾病名称、影像特征、英文名称..." oninput="filterCards()">
  </div>
</div>

<!-- 固定欢迎页（默认隐藏） -->
<div class="welcome" id="welcome" style="display:none;">
  <div class="welcome-inner">
    <div class="welcome-main">
      <div class="welcome-badge">RENCI HOSPITAL . RADIOLOGY DEPT.</div>
      <h2 class="welcome-heading">影像诊断知识库</h2>
      <p class="welcome-lead">收录放射科各系统常见疾病的影像诊断要点，按模块分类，支持关键词检索，助力日常阅片与诊断。</p>
      <div class="welcome-tags">
        <span class="w-tag">中枢神经</span>
        <span class="w-tag">头颈五官</span>
        <span class="w-tag">呼吸系统</span>
        <span class="w-tag">纵隔</span>
        <span class="w-tag">消化系统</span>
        <span class="w-tag">腹膜后</span>
        <span class="w-tag">骨肌系统</span>
        <span class="w-tag">椎管</span>
        <span class="w-tag">心血管</span>
        <span class="w-tag">乳腺</span>
      </div>
    </div>
    <div class="welcome-side">
      <div class="w-stat-card">
        <div class="w-stat-icon">&#128218;</div>
        <div class="w-stat-body">
          <div class="w-stat-num" id="totalCount">0</div>
          <div class="w-stat-label">收录疾病</div>
        </div>
      </div>
      <div class="w-stat-card">
        <div class="w-stat-icon">&#128172;</div>
        <div class="w-stat-body">
          <div class="w-stat-num">CT / MRI</div>
          <div class="w-stat-label">影像特征</div>
        </div>
      </div>
      <div class="w-stat-card">
        <div class="w-stat-icon">&#9889;</div>
        <div class="w-stat-body">
          <div class="w-stat-num">单页检索</div>
          <div class="w-stat-label">无需跳转</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 疾病列表（默认显示） -->
<div class="disease-list show" id="list"></div>

<button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">&#8593;</button>

<script>
// =============================================
// 疾病数据
// =============================================
const DATA = [
  {
    name: "脑梗死",
    subtitle: "Cerebral Infarction",
    module: "brain",
    category: "脑血管",
    clinical: ["定义：脑梗死是由于脑供血动脉闭塞导致局部脑组织缺血坏死的疾病","好发人群：中老年，常有高血压、糖尿病等基础病","好发部位：大脑中动脉供血区最常见","临床特征：突发偏瘫、失语，起病急，多在安静状态下发病"],
    signs: ["DWI高信号", "MCA高密度", "陈旧性软化灶"],
    features: ["超急性期（<6h）：CT可能正常，DWI呈高信号","急性期（6-24h）：CT低密度，DWI明显高信号","责任血管供血区分布，符合血管分布","大脑中动脉高密度征提示急性血栓形成"],
    differential: {"脑出血":"高密度血肿，CT值>50HU，病情常急剧进展"}
  },
  {
    name: "脑出血",
    subtitle: "Intracerebral Hemorrhage",
    module: "brain",
    category: "脑血管",
    clinical: ["定义：非外伤性脑实质内出血","好发人群：高血压人群，40-70岁","好发部位：基底节区（尤其壳核）最常见","临床特征：突发剧烈头痛、呕吐、偏瘫，病情进展快"],
    signs: ["CT高密度", "脑室出血", "蛛网膜下腔出血"],
    features: ["急性期CT高密度（50-80HU），边缘相对清楚","血肿形态可不规则，可破入脑室系统","亚急性期CT密度逐渐减低","MRI信号随血红蛋白演变，超急性T2*低信号"],
    differential: {"脑梗死":"DWI高信号、ADC低信号，CT为低密度"}
  },
  {
    name: "脑膜瘤",
    subtitle: "Meningioma",
    module: "brain",
    category: "肿瘤",
    clinical: ["定义：起源于蛛网膜帽状细胞的颅内常见良性肿瘤","好发人群：40-60岁女性多见","好发部位：大脑凸面、矢状窦旁、蝶骨嵴","临床特征：生长缓慢，病程长，癫痫或局灶神经功能障碍"],
    signs: ["宽基底", "硬膜尾征", "均匀强化", "钙化"],
    features: ["脑外肿瘤，与硬膜关系密切","宽基底贴于颅骨内板或硬脑膜","增强后均匀明显强化","常见硬膜尾征及钙化，邻近骨质可增生硬化"],
    differential: {"胶质瘤":"脑内肿瘤，无宽基底及硬膜尾征，多不规则环状强化"}
  },
  {
    name: "胶质母细胞瘤",
    subtitle: "Glioblastoma Multiforme",
    module: "brain",
    category: "肿瘤",
    clinical: ["定义：WHO IV级星形细胞肿瘤，恶性程度最高","好发人群：50-70岁，男性略多","好发部位：大脑半球白质，额叶、颞叶多见","临床特征：病程短、进展快，头痛、癫痫、神经功能缺损"],
    signs: ["花环状强化", "坏死囊变", "水肿", "蝴蝶征"],
    features: ["位于脑白质内，位置较深","边界不清，浸润性生长","花环状或不规则环形强化，壁结节不规则","中心坏死、囊变明显，周围水肿及占位效应显著"],
    differential: {"转移瘤":"多见灰白质交界，小病灶大水肿，多为多发病灶"}
  },
  {
    name: "多发性硬化",
    subtitle: "Multiple Sclerosis",
    module: "brain",
    category: "脱髓鞘",
    clinical: ["定义：中枢神经系统慢性炎性脱髓鞘疾病","好发人群：20-40岁女性多见","好发部位：侧脑室旁白质、视神经、脊髓","临床特征：病程反复缓解与复发，多灶性神经功能障碍"],
    signs: ["Dawson手指", "室管膜下病变", "新旧不等"],
    features: ["侧脑室旁白质病变，沿室管膜分布","Dawson手指征：垂直于脑室的条状病灶","急性期可强化，慢性期不强化","具有时间多发性和空间多发性"],
    differential: {"缺血性白质病变":"多见于老年人，病变多对称，无强化，无时间多发"}
  },
  {
    name: "鼻咽癌",
    subtitle: "Nasopharyngeal Carcinoma",
    module: "head",
    category: "肿瘤",
    clinical: ["定义：发生于鼻咽部黏膜的恶性肿瘤，与EB病毒感染密切相关","好发人群：40-60岁，华南地区高发","好发部位：鼻咽顶后壁、咽隐窝","临床特征：涕中带血、鼻塞、耳鸣，易早期淋巴结转移"],
    signs: ["咽隐窝变浅", "颈部淋巴结肿大", "颅底骨质破坏"],
    features: ["鼻咽顶后壁或咽隐窝软组织肿块","增强后不均匀强化","易侵犯颅底骨质及颅神经","颈部淋巴结转移常见，可表现为淋巴结融合"],
    differential: {"鼻咽部淋巴瘤":"发病年龄较轻，病变范围较弥漫，强化相对均匀"}
  },
  {
    name: "肺癌",
    subtitle: "Lung Cancer",
    module: "respiratory",

// =============================================
// 功能函数
// =============================================
let activeModule = "all";

function setModule(module) {
  activeModule = module;
  document.querySelectorAll('.module-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.module === module);
  });
  filterCards();
}

function filterCards() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  const showList = q !== '' || activeModule !== 'all';
  document.getElementById('welcome').style.display = showList ? 'none' : '';
  document.getElementById('list').classList.toggle('show', showList);
  if (!showList) return;
  let filtered = DATA;
  if (activeModule !== "all") {
    filtered = filtered.filter(d => d.module === activeModule);
  }
  if (q) {
    filtered = filtered.filter(d => {
      const txt = [d.name, d.category, ...(d.signs||[]), ...(d.clinical||[]), ...(d.features||[])].join(' ').toLowerCase();
      return txt.includes(q);
    });
  }
  const list = document.getElementById('list');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty">未找到匹配疾病，请更换关键词或模块</div>';
    return;
  }
  list.innerHTML = filtered.map(d => `
    <div class="disease-card">
      <div class="card-header" onclick="this.parentElement.querySelector('.card-body').classList.toggle('open');this.querySelector('.arrow').classList.toggle('open')">
        <h3>${d.name}</h3>
        <span class="arrow">&#9654;</span>
      </div>
      <div class="card-body">
        ${d.clinical ? `<div class="info-row"><div class="info-label">临床概述</div><div class="info-text"><ul style="padding-left:16px;margin:0">${d.clinical.map(c => `<li style="color:var(--muted)">${c}</li>`).join('')}</ul></div></div>` : ''}
        ${d.signs && d.signs.length ? `<div class="info-row"><div class="info-label">影像征象</div><div>${d.signs.map(s => `<span class="sign-tag">${s}</span>`).join('')}</div></div>` : ''}
        ${d.features && d.features.length ? `<div class="info-row"><div class="info-label">影像特征（含典型表现）</div><div class="info-text"><ul style="padding-left:16px;margin:0">${d.features.map(f => `<li>${f}</li>`).join('')}</ul></div></div>` : ''}
        ${d.differential ? `<div class="info-row"><div class="info-label" style="color:#ff6b8a">鉴别诊断</div><div class="info-text"><ul style="padding-left:16px;margin:0">${Object.entries(d.differential).map(([name, point]) => `<li><strong style="color:var(--cyan)">${name}</strong>：${point}</li>`).join('')}</ul></div></div>` : ''}
      </div>
    </div>
  `).join('');
}

window.addEventListener('scroll', () => {
  document.getElementById('backTop').style.display = scrollY > 400 ? 'block' : 'none';
});

// 初始化
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('totalCount').textContent = DATA.length;
});
</script>
