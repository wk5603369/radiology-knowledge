<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>影像诊断知识库</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:#f5f7fa;color:#2c3e50;line-height:1.6;padding-bottom:60px}
.header{background:linear-gradient(135deg,#1a5276,#2980b9);color:#fff;padding:16px 20px;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:600}
.module-nav{padding:12px 16px;display:flex;gap:8px;overflow-x:auto;background:#fff;position:sticky;top:50px;z-index:99}
.module-btn{flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#666;transition:all .2s;white-space:nowrap}
.module-btn.active{color:#fff;background:#2980b9;border-color:#2980b9}
.search-box{padding:12px 16px;background:#f5f7fa;position:sticky;top:90px;z-index:98}
.search-box input{width:100%;padding:10px 16px;border:1px solid #ddd;border-radius:20px;font-size:14px;background:#fff;outline:none}
.stats{padding:8px 16px;font-size:12px;color:#888;background:#f5f7fa}
.disease-list{padding:0 16px 100px}
.disease-card{background:#fff;border-radius:12px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden}
.card-header{padding:14px 16px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.card-header h3{font-size:15px;font-weight:600;color:#1a5276;flex:1}
.card-header .arrow{font-size:12px;color:#aaa;transition:transform .3s}
.card-header .arrow.open{transform:rotate(90deg)}
.card-body{display:none;padding:12px 16px 14px;border-top:1px solid #ecf0f1;background:#fafbfc}
.card-body.open{display:block}
.info-section{margin-bottom:12px}
.info-label{display:inline-block;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;margin-bottom:6px;background:#e8f6f3;color:#1e8449}
.info-text{font-size:13px;color:#444;line-height:1.6}
</style>
</head>
<body>

<div class="header">
<h1>影像诊断知识库</h1>
</div>

<div class="module-nav" id="moduleNav">
<button class="module-btn active" onclick="setModule('all')">全部</button>
<button class="module-btn" onclick="setModule('bone')">骨肌系统</button>
</div>

<div class="search-box">
<input type="text" id="search" placeholder="搜索疾病名称..." oninput="filterCards()">
</div>

<div class="stats" id="stats"></div>

<div class="disease-list" id="list"></div>

<script>
let currentModule = 'all';

const DATA = [
  {
    name: "骨性关节炎",
    nameEn: "Osteoarthritis",
    module: "bone",
    subsystem: "关节",
    clinical: "定义：一种以关节软骨退行性变和继发性骨质增生为特征的慢性关节疾病。好发人群：中老年人，女性多于男性，肥胖者多见。好发部位：膝关节、髋关节、手关节。临床特征：关节疼痛（活动后加重，休息后缓解）、关节僵硬（晨僵时间短，通常<30分钟）。",
    signs: "1. 关节间隙狭窄（非对称性、不均匀）；2. 骨赘形成（关节边缘尖锐增生）；3. 软骨下硬化（骨密度增高）。",
    features: "X线表现：早期关节间隙轻度狭窄、骨赘形成；中期关节间隙明显狭窄、软骨下硬化、囊肿形成；晚期关节间隙消失、严重骨赘、关节畸形。MRI表现：早期显示软骨退变（T2WI信号增高、软骨变薄）、骨髓水肿。"
  },
  {
    name: "类风湿关节炎",
    nameEn: "Rheumatoid Arthritis",
    module: "bone",
    subsystem: "关节",
    clinical: "定义：一种以侵蚀性、对称性多关节炎为主要临床表现的慢性、全身性自身免疫性疾病。好发人群：30-50岁女性多见。好发部位：手足小关节（掌指关节、近端指间关节、腕关节）。临床特征：对称性、持续性关节疼痛、肿胀、晨僵（>1小时）。",
    signs: "1. 关节间隙均匀性狭窄；2. 边缘性骨侵蚀；3. 骨质疏松（全身性）。",
    features: "X线表现：早期软组织肿胀、骨质疏松；中期关节间隙均匀狭窄、边缘性骨侵蚀；晚期关节半脱位/脱位、关节强直。MRI表现：早期显示滑膜炎、血管翳、骨髓水肿。"
  },
  {
    name: "痛风性关节炎",
    nameEn: "Gouty Arthritis",
    module: "bone",
    subsystem: "关节",
    clinical: "定义：由于尿酸盐结晶沉积在关节及周围组织引起的炎症反应。好发人群：中老年男性。好发部位：第一跖趾关节（50-70%）、踝关节、膝关节。临床特征：急性发作、剧烈疼痛、红肿热痛、夜间发作。",
    signs: "1. 穿凿样骨侵蚀（圆形/椭圆形骨质缺损、边缘硬化）；2. 痛风石（软组织结节）。",
    features: "X线表现：早期正常或仅有软组织肿胀；典型期穿凿样骨侵蚀、关节间隙保持；慢性期痛风石、关节畸形。双能CT：绿色编码尿酸盐结晶（特异性诊断）。"
  },
  {
    name: "夏科氏关节病",
    nameEn: "Charcot Joint",
    module: "bone",
    subsystem: "关节",
    clinical: "定义：由于神经感觉丧失导致关节反复损伤、退化、破坏的一种神经关节病。好发人群：糖尿病患者（60-75%）、脊髓痨（梅毒）。好发部位：足部（50%）、膝关节（25%）。临床特征：关节肿胀、积液；疼痛轻微或无痛（特征性）；神经病变表现。",
    signs: "经典5D征象：1. Density（密度增高）；2. Debris（碎屑）；3. Dislocation（脱位）；4. Distension（肿胀）；5. Destruction（破坏）。",
    features: "X线表现：早期关节积液、软组织肿胀；进展期关节间隙狭窄、骨侵蚀、碎骨片、半脱位；晚期严重骨破坏、关节脱位、骨硬化、关节融合。"
  },
  {
    name: "骨纤维结构不良",
    nameEn: "Fibrous Dysplasia",
    module: "bone",
    subsystem: "肿瘤",
    clinical: "定义：骨的生长发育性疾病，发生于形成骨的间充质的发育畸形。好发人群：任何年龄，幼年时发病。好发部位：全身骨骼均可发病；单骨型多见于股骨颈、胫骨；多骨型多见于长骨、颅骨。",
    signs: "1. 磨玻璃样改变；2. 囊状膨胀性改变；3. 丝瓜络样改变；4. 虫蚀样改变。",
    features: "X线和CT表现：磨玻璃样改变（特征）、囊状膨胀性改变、丝瓜络样改变、虫蚀样改变。MRI表现：T1WI边界清晰，呈中等至低信号；T2WI呈中等至高信号。"
  },
  {
    name: "动脉瘤样骨囊肿",
    nameEn: "Aneurysmal Bone Cyst",
    module: "bone",
    subsystem: "肿瘤",
    clinical: "定义：扩张性的溶骨性病变，内含充满血液的腔隙。好发人群：原发性ABC好发于20岁以下儿童青少年。好发部位：多累及长管状骨的干骺端，其次为脊柱。",
    signs: "1. 液-液平面（特征性）；2. 膨胀性分叶状改变；3. 低信号环。",
    features: "CT表现：病变内液-液平面（较特异性征象）；增强扫描囊间隔强化。MRI表现：病变呈边缘清楚的膨胀性分叶状改变；T2WI上层为高信号（浆液），下层为较低信号（血液/含铁血黄素）。"
  },
  {
    name: "骨巨细胞瘤",
    nameEn: "Giant Cell Tumor",
    module: "bone",
    subsystem: "肿瘤",
    clinical: "定义：起源于骨间质组织的肿瘤，由梭形基质细胞和大量破骨细胞样多核巨细胞组成。好发人群：20-40岁青壮年，女性略多。好发部位：股骨下端、胫骨上端、桡骨下端（膝关节周围占50%以上）。",
    signs: "1. 皂泡状改变；2. 地图样溶骨；3. 偏心性生长；4. 无硬化边。",
    features: "X线及CT表现：地图样溶骨性破坏，边缘清晰但无硬化边；病灶位于骨端（关节面下），常横向偏心生长。MRI表现：T2WI常为低、等、高混杂信号；约63%可出现含铁血黄素沉着（T2WI低信号）。"
  },
  {
    name: "骨肉瘤",
    nameEn: "Osteosarcoma",
    module: "bone",
    subsystem: "肿瘤",
    clinical: "定义：最常见的原发性恶性骨肿瘤，特征为肿瘤细胞产生骨样基质。好发人群：10-25岁青少年，男性多见。好发部位：长骨干骺端（股骨远端、胫骨近端最常见）。临床特征：疼痛（早期间歇性，后持续性）、肿胀、活动受限、病理性骨折。",
    signs: "1. 骨质破坏；2. 肿瘤骨形成（云絮状/斑块状高密度）；3. 骨膜反应（Codman三角、日光放射状）。",
    features: "X线表现：骨质破坏（溶骨性、成骨性或混合性）；肿瘤骨形成（云絮状、斑块状、针状高密度影）；骨膜反应（Codman三角、日光放射状骨针）。MRI表现：T1WI低信号，T2WI混杂高信号；显示骨髓浸润和软组织肿块优于CT。"
  }
];

function setModule(module) {
  currentModule = module;
  document.querySelectorAll('.module-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  event.target.classList.add('active');
  filterCards();
}

function filterCards() {
  const keyword = document.getElementById('search').value.toLowerCase();
  let filtered = DATA;
  
  if (currentModule !== 'all') {
    filtered = filtered.filter(d => d.module === currentModule);
  }
  
  if (keyword) {
    filtered = filtered.filter(d => {
      return d.name.toLowerCase().includes(keyword) || 
             d.clinical.toLowerCase().includes(keyword);
    });
  }
  
  renderList(filtered);
}

function renderList(data) {
  const listEl = document.getElementById('list');
  const statsEl = document.getElementById('stats');
  
  statsEl.textContent = '共 ' + DATA.length + ' 个疾病 | 当前显示 ' + data.length + ' 个';
  
  if (data.length === 0) {
    listEl.innerHTML = '<div style="text-align:center;padding:40px;color:#888">暂无匹配疾病</div>';
    return;
  }
  
  listEl.innerHTML = data.map(d => {
    return `
      <div class="disease-card">
        <div class="card-header" onclick="toggle(this)">
          <h3>${d.name}（${d.nameEn}）</h3>
          <span class="arrow">▶</span>
        </div>
        <div class="card-body">
          <div class="info-section">
            <span class="info-label">临床概述</span>
            <div class="info-text">${d.clinical}</div>
          </div>
          <div class="info-section">
            <span class="info-label">影像征象</span>
            <div class="info-text">${d.signs}</div>
          </div>
          <div class="info-section">
            <span class="info-label">影像特征</span>
            <div class="info-text">${d.features}</div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function toggle(header) {
  const body = header.nextElementSibling;
  const arrow = header.querySelector('.arrow');
  body.classList.toggle('open');
  arrow.classList.toggle('open');
}

// 初始化
filterCards();
</script>
</body>
</html>
